{% extends 'vendor_base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">
        Welcome, {{ user.username }} 👋
    </h2>

    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card text-center border-success shadow">
                <div class="card-body">
                    <h5>Total Foods</h5>
                    <h2 class="text-success">{{ total_foods }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center border-warning shadow">
                <div class="card-body">
                    <h5>Pending Orders</h5>
                    <h2 class="text-warning">{{ pending_orders }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center border-primary shadow">
                <div class="card-body">
                    <h5>Completed Orders</h5>
                    <h2 class="text-primary">{{ completed_orders }}</h2>
                </div>
            </div>
        </div>

    </div>

    <hr class="my-4">

    <h4>Quick Actions</h4>

    <div class="row mt-3">

        <div class="col-md-3 mb-3">
            <a href="{% url 'menubuilding' %}" class="btn btn-success w-100 py-3">
                ➕ Add Food
            </a>
        </div>

        <div class="col-md-3 mb-3">
            <a href="{% url 'foodlist' %}" class="btn btn-primary w-100 py-3">
                🍽 View Food Menu
            </a>
        </div>

        <div class="col-md-3 mb-3">
            <a href="{% url 'vendor_orders' %}" class="btn btn-warning w-100 py-3">
                📦 View Orders
            </a>
        </div>

    </div>

</div>

{% endblock %}
