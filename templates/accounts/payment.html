{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2>Select Payment Method</h2>

            <hr>

            <h4>Total Amount : ₹{{ order.total_price }}</h4>

            <form method="POST">

                {% csrf_token %}

                <div class="form-check mt-3">

                    <input
                        class="form-check-input"
                        type="radio"
                        name="payment_method"
                        value="COD"
                        checked>

                    <label class="form-check-label">
                        Cash On Delivery
                    </label>

                </div>

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="radio"
                        name="payment_method"
                        value="UPI">

                    <label class="form-check-label">
                        UPI
                    </label>

                </div>

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="radio"
                        name="payment_method"
                        value="CARD">

                    <label class="form-check-label">
                        Debit / Credit Card
                    </label>

                </div>

                <button class="btn btn-success mt-4">
                    Pay Now
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
